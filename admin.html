<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Shared Cart</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #1a1a2e;
            min-height: 100vh;
            padding: 15px;
            color: #eee;
        }

        .container { max-width: 500px; margin: 0 auto; }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            flex-wrap: wrap;
            gap: 10px;
        }

        h1 { color: #fff; font-size: 1.3rem; }

        .header-actions { display: flex; gap: 8px; flex-wrap: wrap; }

        .header-actions a,
        .header-actions button {
            background: #3498db;
            color: white;
            border: none;
            padding: 8px 14px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.85rem;
            text-decoration: none;
        }

        .clear-btn { background: #e74c3c; }
        .save-clear-btn { background: #f39c12; }
        .refresh-btn { background: #2ecc71; }

        /* Summary bar */
        .summary-bar {
            display: flex;
            justify-content: space-between;
            background: #16213e;
            padding: 10px 15px;
            border-radius: 8px;
            margin-bottom: 12px;
            font-size: 0.9rem;
            color: #aaa;
        }

        .summary-bar strong { color: #f39c12; }

        /* Order list */
        .order-list {
            list-style: none;
            background: #16213e;
            border-radius: 8px;
            overflow: hidden;
        }

        .order-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 15px;
            border-bottom: 1px solid #1f2b47;
        }

        .order-item:last-child { border-bottom: none; }

        .order-item .name {
            flex: 1;
            font-size: 0.95rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            margin-right: 10px;
        }

        .order-item .who {
            font-size: 0.75rem;
            color: #888;
            margin-right: 12px;
            white-space: nowrap;
        }

        .order-item .qty-badge {
            background: #3498db;
            color: #fff;
            font-weight: 700;
            min-width: 28px;
            text-align: center;
            padding: 3px 8px;
            border-radius: 14px;
            font-size: 0.85rem;
            flex-shrink: 0;
        }

        .order-item .price {
            color: #2ecc71;
            font-size: 0.8rem;
            margin-right: 10px;
            flex-shrink: 0;
        }

        .order-item .qty-controls {
            display: flex;
            align-items: center;
            gap: 6px;
            flex-shrink: 0;
            margin-right: 8px;
        }

        .order-item .qty-btn {
            background: #3498db;
            color: white;
            border: none;
            width: 26px;
            height: 26px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            line-height: 1;
        }

        .order-item .qty-btn.minus { background: #e67e22; }
        .order-item .qty-btn.minus:hover { background: #d35400; }
        .order-item .qty-btn:hover { background: #2980b9; }

        .order-item .remove-x {
            background: none;
            border: none;
            color: #e74c3c;
            font-size: 1.1rem;
            cursor: pointer;
            padding: 0 0 0 8px;
            line-height: 1;
            flex-shrink: 0;
        }

        .order-item .remove-x:hover { color: #ff6b6b; }

        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: #555;
        }

        .auto-refresh {
            display: flex;
            align-items: center;
            gap: 8px;
            color: #666;
            font-size: 0.8rem;
            margin-bottom: 10px;
        }

        .auto-refresh input { width: 16px; height: 16px; cursor: pointer; }

        .last-updated {
            text-align: center;
            color: #555;
            font-size: 0.8rem;
            margin-top: 12px;
        }

        /* Status toast */
        .status {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: #333;
            color: white;
            padding: 10px 20px;
            border-radius: 5px;
            display: none;
            z-index: 1000;
            font-size: 0.85rem;
        }

        .status.show { display: block; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🔐 Admin Dashboard</h1>
            <div class="header-actions">
                <a href="index.html">← Back to Menu</a>
                <button class="refresh-btn" onclick="loadCart()">🔄 Refresh</button>
                <button class="save-clear-btn" id="save-clear-btn" onclick="saveAndClearCart()">💾 Save & Clear</button>
                <button class="clear-btn" onclick="clearCart()">🗑️ Clear All</button>
            </div>
        </header>

        <div class="auto-refresh">
            <input type="checkbox" id="auto-refresh">
            <label for="auto-refresh">Auto-refresh (5s)</label>
        </div>

        <div class="summary-bar">
            <span><span id="total-items">0</span> items</span>
            <span><span id="unique-items">0</span> unique</span>
            <span>Total: <strong id="total-amount">₹0</strong></span>
        </div>

        <div id="cart-list">Loading...</div>

        <div class="last-updated" id="last-updated"></div>
    </div>

    <!-- Status Message -->
    <div class="status" id="status"></div>

    <!-- Supabase JS Client -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <script>
        // Supabase Configuration
        const SUPABASE_URL = 'https://qlkasdsfrbvxpvgiiojs.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_iIybMY4jVAVqe2dkGGWaRA_qrKXJd4k';
        const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        let cartData = { items: [], lastUpdated: null, visibleCategories: {} };
        let autoRefreshInterval = null;

        // Menu data for prices
        const menuData = {
            "Desi Swad Chai Varieties": [
                { "name": "Ginger Tea", "price": "₹26" },
                { "name": "Filter Coffee", "price": "₹26" },
                { "name": "Hot Badam Milk", "price": "₹30" },
                { "name": "Horlicks / Bournvita", "price": "₹30" },
                { "name": "Maalnad Kashaya", "price": "₹30" },
                { "name": "Turmeric Milk", "price": "₹40" },
                { "name": "Ginger Jaggery Tea", "price": "₹35" },
                { "name": "Ginger Lemon Tea", "price": "₹20" },
                { "name": "Lemon Honey Tea", "price": "₹24" }
            ],
            "Green Tea Varieties": [
                { "name": "Darjeeling Royal Green", "price": "₹28" },
                { "name": "Revital Green", "price": "₹28" },
                { "name": "Cinnamon Premium", "price": "₹28" },
                { "name": "Vanilla Refresh", "price": "₹28" }
            ],
            "Black Tea Varieties": [
                { "name": "Revital Black Tea", "price": "₹28" },
                { "name": "Basil Black Delight", "price": "₹28" },
                { "name": "Lemon Jeera Jaggery Tea", "price": "₹28" },
                { "name": "Rose Premium Tea", "price": "₹28" },
                { "name": "Black Tea with Vanilla", "price": "₹28" }
            ],
            "Special Varieties (With Milk)": [
                { "name": "Chai Elaichi Wali", "price": "₹27" },
                { "name": "Cinnamon Royal Tea", "price": "₹27" },
                { "name": "Irani Rose Premium Tea", "price": "₹27" },
                { "name": "Indian Tea with Vanilla", "price": "₹27" }
            ],
            "Pure Herb Tea Varieties": [
                { "name": "Immune Tea", "price": "₹28" },
                { "name": "Refresh Tea", "price": "₹28" },
                { "name": "Cinnamon Tea with Honey", "price": "₹28" },
                { "name": "Real Mint with Honey", "price": "₹28" }
            ],
            "Cold Beverages": [
                { "name": "Cold Badam Milk", "price": "₹44" },
                { "name": "Cold Coffee", "price": "₹60" },
                { "name": "Jaggery Lassi", "price": "₹35" },
                { "name": "Butter Milk", "price": "₹16" },
                { "name": "Fresh Fruit Juices (Seasonal)", "price": "₹55" },
                { "name": "Fresh Lime Water", "price": "₹16" },
                { "name": "Fresh Lime with Soda", "price": "₹30" },
                { "name": "Lemon Soda", "price": "₹30" },
                { "name": "Sweet Lassi", "price": "₹35" },
                { "name": "Strawberry Lassi", "price": "₹45" },
                { "name": "Rose Lassi", "price": "₹45" },
                { "name": "Mango Lassi (Seasonal)", "price": "₹45" },
                { "name": "Kokum Juice", "price": "₹45" }
            ]
            // "Bakery Products": [
            //     { "name": "Veg Puff", "price": "₹30" },
            //     { "name": "Samosa", "price": "₹30" },
            //     { "name": "Sugar / Choco Doughnut", "price": "₹30" },
            //     { "name": "Veg Burger", "price": "₹58" },
            //     { "name": "Honey Cake", "price": "₹32" },
            //     { "name": "Banana Cake", "price": "₹52" }
            // ]
        };

        // All menu categories
        const allCategories = [
            "Desi Swad Chai Varieties",
            "Green Tea Varieties",
            "Black Tea Varieties",
            "Special Varieties (With Milk)",
            "Pure Herb Tea Varieties",
            "Cold Beverages",
            "Bakery Products"
        ];

        // Show status message
        function showStatus(message) {
            const status = document.getElementById('status');
            status.textContent = message;
            status.classList.add('show');
            setTimeout(() => status.classList.remove('show'), 2000);
        }

        // Parse price string to number
        function parsePrice(priceStr) {
            return parseFloat(priceStr.replace('₹', '').replace(',', ''));
        }

        // Format number to price string
        function formatPrice(num) {
            return '₹' + num.toFixed(2);
        }

        function getUnitPrice(foodName) {
            for (const categoryItems of Object.values(menuData)) {
                const menuItem = categoryItems.find(item => item.name === foodName);
                if (menuItem) {
                    return parsePrice(menuItem.price);
                }
            }
            return 0;
        }

        function setSaveClearLoading(isLoading) {
            const button = document.getElementById('save-clear-btn');
            if (!button) return;
            button.disabled = isLoading;
            button.textContent = isLoading ? '⏳ Saving...' : '💾 Save & Clear';
        }

        // Load cart from Supabase
        async function loadCart() {
            try {
                // Load orders from current_order table
                const { data: orders, error: ordersError } = await supabaseClient
                    .from('current_order')
                    .select('*')
                    .order('created_at', { ascending: true });
                
                if (ordersError) throw ordersError;
                
                // Load visible categories from app_settings
                const { data: settings } = await supabaseClient
                    .from('app_settings')
                    .select('visible_categories, updated_at')
                    .eq('id', 1)
                    .single();
                
                cartData.visibleCategories = settings?.visible_categories || {};
                
                // Initialize all categories as visible if not set
                allCategories.forEach(cat => {
                    if (cartData.visibleCategories[cat] === undefined) {
                        cartData.visibleCategories[cat] = true;
                    }
                });
                
                // Group orders by food_name to build cart items
                const itemsMap = {};
                (orders || []).forEach(order => {
                    if (!itemsMap[order.food_name]) {
                        // Find price from menuData
                        let price = '₹0';
                        for (const category of Object.values(menuData)) {
                            const menuItem = category.find(item => item.name === order.food_name);
                            if (menuItem) {
                                price = menuItem.price;
                                break;
                            }
                        }
                        itemsMap[order.food_name] = {
                            name: order.food_name,
                            price: price,
                            qty: 0,
                            orders: []
                        };
                    }
                    itemsMap[order.food_name].qty += order.quantity;
                    itemsMap[order.food_name].orders.push({
                        id: order.id,
                        user: order.username,
                        qty: order.quantity,
                        time: new Date(order.created_at).getTime()
                    });
                });
                
                cartData.items = Object.values(itemsMap);
                cartData.lastUpdated = settings?.updated_at ? new Date(settings.updated_at).getTime() : Date.now();
                
                renderCart();
                // renderCategories();
                updateStats();
                updateLastUpdated();
            } catch (error) {
                console.error('Error loading cart:', error);
                showStatus('Error loading cart');
            }
        }

        // Save settings to Supabase (for category visibility)
        async function saveSettings() {
            try {
                const { error } = await supabaseClient
                    .from('app_settings')
                    .upsert({
                        id: 1,
                        visible_categories: cartData.visibleCategories,
                        updated_at: new Date().toISOString()
                    });
                
                if (error) throw error;
                showStatus('Settings updated!');
            } catch (error) {
                console.error('Error saving settings:', error);
                showStatus('Error saving settings');
            }
        }

        // Increment item quantity (add one more order)
        async function incrementItem(name) {
            try {
                // Find the item to get user info (use first user's name for admin additions)
                const item = cartData.items.find(i => i.name === name);
                const username = item?.orders?.[0]?.user || 'Admin';
                
                const { error } = await supabaseClient
                    .from('current_order')
                    .insert({
                        username: username,
                        food_name: name,
                        quantity: 1
                    });
                
                if (error) throw error;
                await loadCart();
                showStatus(`${name} +1`);
            } catch (error) {
                console.error('Error incrementing item:', error);
                showStatus('Error updating quantity');
            }
        }

        // Decrement item quantity (remove one order)
        async function decrementItem(name) {
            try {
                const item = cartData.items.find(i => i.name === name);
                if (!item || item.orders.length === 0) return;
                
                // Delete the most recent order for this item
                const orderToDelete = item.orders[item.orders.length - 1];
                
                const { error } = await supabaseClient
                    .from('current_order')
                    .delete()
                    .eq('id', orderToDelete.id);
                
                if (error) throw error;
                await loadCart();
                showStatus(`${name} -1`);
            } catch (error) {
                console.error('Error decrementing item:', error);
                showStatus('Error updating quantity');
            }
        }

        // Remove item from cart
        async function removeItem(name) {
            if (confirm(`Remove all "${name}" from cart?`)) {
                try {
                    const { error } = await supabaseClient
                        .from('current_order')
                        .delete()
                        .eq('food_name', name);
                    
                    if (error) throw error;
                    await loadCart();
                    showStatus(`${name} removed!`);
                } catch (error) {
                    console.error('Error removing item:', error);
                    showStatus('Error removing item');
                }
            }
        }

        // Clear entire cart
        async function clearCart() {
            if (confirm('Are you sure you want to clear the entire cart?')) {
                try {
                    const { error } = await supabaseClient
                        .from('current_order')
                        .delete()
                        .neq('id', 0); // Delete all rows
                    
                    if (error) throw error;
                    await loadCart();
                    showStatus('Cart cleared!');
                } catch (error) {
                    console.error('Error clearing cart:', error);
                    showStatus('Error clearing cart');
                }
            }
        }

        // Save current cart into order_history and then clear archived rows
        async function saveAndClearCart() {
            if (!confirm('Save current cart to history and clear it?')) {
                return;
            }

            setSaveClearLoading(true);

            try {
                const { data: currentOrders, error: fetchError } = await supabaseClient
                    .from('current_order')
                    .select('id, username, food_name, quantity');

                if (fetchError) throw fetchError;

                if (!currentOrders || currentOrders.length === 0) {
                    showStatus('No orders to save');
                    return;
                }

                const payload = currentOrders.map(order => ({
                    id: order.id,
                    username: order.username,
                    food_name: order.food_name,
                    quantity: order.quantity,
                    unit_price: getUnitPrice(order.food_name)
                }));

                const { data: rpcData, error: rpcError } = await supabaseClient
                    .rpc('save_and_clear_orders', { p_orders: payload });

                if (rpcError) throw rpcError;

                const result = Array.isArray(rpcData) ? rpcData[0] : rpcData;
                const archivedCount = result?.archived_count ?? payload.length;
                const batchId = result?.order_batch_id || 'unknown';

                await loadCart();
                showStatus(`Saved ${archivedCount} rows (Batch ${String(batchId).slice(0, 8)}...)`);
            } catch (error) {
                console.error('Error saving and clearing cart:', error);
                showStatus('Error in Save & Clear');
            } finally {
                setSaveClearLoading(false);
            }
        }

        // Update stats
        function updateStats() {
            const totalItems = cartData.items.reduce((sum, item) => sum + item.qty, 0);
            const uniqueItems = cartData.items.length;
            const totalAmount = cartData.items.reduce((sum, item) => {
                return sum + (parsePrice(item.price) * item.qty);
            }, 0);

            document.getElementById('total-items').textContent = totalItems;
            document.getElementById('unique-items').textContent = uniqueItems;
            document.getElementById('total-amount').textContent = formatPrice(totalAmount);
        }

        // Update last updated time
        function updateLastUpdated() {
            const el = document.getElementById('last-updated');
            if (cartData.lastUpdated) {
                const date = new Date(cartData.lastUpdated);
                el.textContent = `Last updated: ${date.toLocaleString()}`;
            } else {
                el.textContent = '';
            }
        }

        // Render cart as a simple list
        function renderCart() {
            const container = document.getElementById('cart-list');

            if (cartData.items.length === 0) {
                container.innerHTML = '<div class="empty-state">🛒 Cart is empty</div>';
                return;
            }

            let html = '<ul class="order-list">';
            for (const item of cartData.items) {
                // Build compact "who" string
                let who = '';
                if (item.orders && item.orders.length > 0) {
                    const userCounts = {};
                    for (const o of item.orders) {
                        userCounts[o.user] = (userCounts[o.user] || 0) + 1;
                    }
                    who = Object.entries(userCounts)
                        .map(([u, c]) => c > 1 ? u + '×' + c : u)
                        .join(', ');
                }

                const escapedName = item.name.replace(/'/g, "\\'");
                html += `
                    <li class="order-item">
                        <span class="name">${item.name}</span>
                        <span class="price">${item.price}</span>
                        ${who ? '<span class="who">' + who + '</span>' : ''}
                        <div class="qty-controls">
                            <button class="qty-btn minus" onclick="decrementItem('${escapedName}')">−</button>
                            <span class="qty-badge">${item.qty}</span>
                            <button class="qty-btn" onclick="incrementItem('${escapedName}')">+</button>
                        </div>
                        <button class="remove-x" onclick="removeItem('${escapedName}')" title="Remove all">✕</button>
                    </li>`;
            }
            html += '</ul>';
            container.innerHTML = html;
        }

        // Render category toggles
        function renderCategories() {
            const container = document.getElementById('category-grid');
            
            let html = '';
            allCategories.forEach(category => {
                const isVisible = cartData.visibleCategories[category] !== false;
                const statusClass = isVisible ? 'visible' : 'hidden';
                const statusText = isVisible ? 'ON' : 'OFF';
                
                html += `
                    <div class="category-toggle ${isVisible ? '' : 'disabled'}">
                        <label for="cat-${category.replace(/\s+/g, '-')}">
                            ${category}
                            <span class="category-status ${statusClass}">${statusText}</span>
                        </label>
                        <div class="toggle-switch">
                            <input type="checkbox" 
                                   id="cat-${category.replace(/\s+/g, '-')}" 
                                   ${isVisible ? 'checked' : ''}
                                   onchange="toggleCategory('${category}')">
                            <span class="toggle-slider"></span>
                        </div>
                    </div>
                `;
            });
            
            container.innerHTML = html;
        }

        // Toggle single category visibility
        async function toggleCategory(category) {
            cartData.visibleCategories[category] = !cartData.visibleCategories[category];
            // renderCategories();
            await saveSettings();
            showStatus(`${category} ${cartData.visibleCategories[category] ? 'enabled' : 'disabled'}`);
        }

        // Toggle all categories
        async function toggleAllCategories() {
            // Check if most are visible
            const visibleCount = allCategories.filter(cat => cartData.visibleCategories[cat] !== false).length;
            const shouldDisable = visibleCount > allCategories.length / 2;
            
            allCategories.forEach(cat => {
                cartData.visibleCategories[cat] = !shouldDisable;
            });
            
            // renderCategories();
            await saveSettings();
            showStatus(shouldDisable ? 'All categories disabled' : 'All categories enabled');
        }

        // Toggle auto-refresh
        function toggleAutoRefresh() {
            const checkbox = document.getElementById('auto-refresh');
            
            if (checkbox.checked) {
                autoRefreshInterval = setInterval(loadCart, 5000);
            } else {
                clearInterval(autoRefreshInterval);
            }
        }

        // Initialize
        document.addEventListener('DOMContentLoaded', async () => {
            await loadCart();
            
            // Setup auto-refresh
            const checkbox = document.getElementById('auto-refresh');
            checkbox.addEventListener('change', toggleAutoRefresh);
            toggleAutoRefresh(); // Start auto-refresh by default
        });
    </script>
</body>
</html>
